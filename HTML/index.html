<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <h3 style="colour: brown;text-align: center;">
            <u> student Registration Form
        </u>
        </h3>
    <label for="Name">Name:</label>
    <input type="text" id="name" placeholder="Enter your name"/><br>
    <label for="Email">Email:</label>
    <input type="email" id="email" placeholder="Enter your email"/><br>
    <label for="Contact">Contact:</label>
    <input type="number" id="contact" placeholder="Enter your contact"/><br>
    <label for="gender">Gender:</label>
    <input type="checkbox" name="Gender" value="Male"/><br>
    <input type="checkbox" name="Gender" value="Female"/><br>
    <input type="checkbox" name="Gender" value="Other"/><br>
    <label for="Name"> date of birth:</label><br><br><br>
    <input type="date" name="date of birth"/><br>
    <label for="Address">Address:</label><br>
    <textarea name="address" placeholder="Enter your address"></textarea><br>
    <label for="Pin">Area PIN:</label>
    <input type="text" name="Area pin" placeholder="Enter your Area PIN"/><br>
    <label for="State">State:</label>
    <input type="text" name="State" placeholder="Enter your State"/><br>
    <label for="Name"> Opitional:</label>
    <input type="text" name="Opitional" placeholder="Enter your Optional"/><br>
    <label for="name"> Qualification:</label>
    <select name="Course">
        <option value="BCA">BCA</option>
        <option value="BSc">BSc</option>
        <option value="BA">BA</option>
        <option value="BCom">BCom</option>
    </select>
    </form>
</body>
</html>
